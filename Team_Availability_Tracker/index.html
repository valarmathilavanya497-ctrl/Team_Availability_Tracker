<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Availability Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1f2435;
      --border: #2a2f42;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --available: #22c55e;
      --available-bg: rgba(34,197,94,0.12);
      --busy: #f97316;
      --busy-bg: rgba(249,115,22,0.12);
      --accent: #6366f1;
      --accent-hover: #4f52e0;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* ---- HEADER ---- */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
    }

    .header-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
    }

    .tab {
      padding: 6px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .tab:hover:not(.active) { color: var(--text); }

    /* ---- MAIN ---- */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ---- STATS ROW ---- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-value.green { color: var(--available); }
    .stat-value.orange { color: var(--busy); }
    .stat-value.accent { color: var(--accent); }

    /* ---- SECTION HEADER ---- */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ---- BUTTONS ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 9px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--danger); }

    /* ---- TABLE ---- */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .table-head {
      display: grid;
      grid-template-columns: 1fr 160px 80px 44px;
      padding: 12px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .member-row {
      display: grid;
      grid-template-columns: 1fr 160px 80px 44px;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      gap: 0;
    }

    .member-row:last-child { border-bottom: none; }
    .member-row:hover { background: rgba(99,102,241,0.04); }

    .member-info { display: flex; align-items: center; gap: 12px; }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
    }

    .member-name {
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text);
    }

    .member-role {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* STATUS BADGE */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .status-badge.available {
      background: var(--available-bg);
      color: var(--available);
      border: 1px solid rgba(34,197,94,0.25);
    }

    .status-badge.busy {
      background: var(--busy-bg);
      color: var(--busy);
      border: 1px solid rgba(249,115,22,0.25);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-badge.available .status-dot { background: var(--available); box-shadow: 0 0 6px var(--available); }
    .status-badge.busy .status-dot { background: var(--busy); }

    /* TOGGLE */
    .toggle-wrap { display: flex; justify-content: center; }

    .toggle {
      position: relative;
      width: 44px; height: 24px;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 12px;
      transition: background 0.25s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .toggle input:checked + .toggle-slider { background: var(--available); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* ---- ADD MEMBER FORM ---- */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 24px;
      display: none;
      animation: slideDown 0.2s ease;
    }

    .add-form.open { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.18s;
      outline: none;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ---- EMPTY / LOADING ---- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state svg { opacity: 0.3; margin-bottom: 16px; }

    .loading-row {
      padding: 20px;
      display: flex;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ---- TOAST ---- */
    .toast-wrap {
      position: fixed;
      bottom: 28px;
      right: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 999;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: var(--shadow);
      animation: toastIn 0.25s ease;
      max-width: 280px;
    }

    .toast.success { border-left-color: var(--available); }
    .toast.error { border-left-color: var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 600px) {
      main { padding: 24px 16px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .table-head { grid-template-columns: 1fr 130px 56px; }
      .table-head > *:last-child { display: none; }
      .member-row { grid-template-columns: 1fr 130px 56px; }
      .member-row > *:last-child { display: none; }
      .form-row { grid-template-columns: 1fr; }
      header { padding: 0 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    TeamPulse
  </div>
  <div class="header-tabs">
    <button class="tab active">Dashboard</button>
    <button class="tab">Team</button>
  </div>
</header>

<main>

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <span class="stat-label">Total Members</span>
      <span class="stat-value accent" id="statTotal">–</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Available</span>
      <span class="stat-value green" id="statAvailable">–</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Busy</span>
      <span class="stat-value orange" id="statBusy">–</span>
    </div>
  </div>

  <!-- TEAM TABLE -->
  <div class="section-header">
    <span class="section-title">Team Availability</span>
    <button class="btn btn-primary" id="addBtn" onclick="toggleAddForm()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Add Member
    </button>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <span>Member</span>
      <span>Status</span>
      <span style="text-align:center">Toggle</span>
      <span></span>
    </div>
    <div id="teamList">
      <div class="loading-row">Loading team…</div>
    </div>
  </div>

  <!-- ADD MEMBER FORM -->
  <div class="add-form" id="addForm">
    <div class="form-title">Add New Member</div>
    <div class="form-row">
      <div class="field">
        <label for="inputName">Name</label>
        <input type="text" id="inputName" placeholder="Full name" />
      </div>
      <div class="field">
        <label for="inputRole">Role</label>
        <input type="text" id="inputRole" placeholder="Job title" />
      </div>
      <div class="field">
        <button class="btn btn-primary" onclick="addMember()">Add</button>
      </div>
    </div>
  </div>

</main>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  const API = "http://localhost:5000/api";
  let teamData = [];

  // ---- FETCH TEAM ----
  async function fetchTeam() {
    try {
      const res = await fetch(`${API}/team`);
      const data = await res.json();
      if (data.success) {
        teamData = data.team;
        renderTeam();
        renderStats();
      }
    } catch (e) {
      document.getElementById("teamList").innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
          <p>Cannot connect to server.<br/>Make sure <code>app.py</code> is running on port 5000.</p>
        </div>`;
      toast("Cannot connect to backend server", "error");
    }
  }

  // ---- RENDER ----
  function renderTeam() {
    const list = document.getElementById("teamList");
    if (!teamData.length) {
      list.innerHTML = `<div class="empty-state"><p>No team members yet. Add one above!</p></div>`;
      return;
    }
    list.innerHTML = teamData.map(m => `
      <div class="member-row" id="row-${m.id}">
        <div class="member-info">
          <div class="avatar">${initials(m.name)}</div>
          <div>
            <div class="member-name">${esc(m.name)}</div>
            <div class="member-role">${esc(m.role)}</div>
          </div>
        </div>
        <div>
          <span class="status-badge ${m.available ? 'available' : 'busy'}">
            <span class="status-dot"></span>
            ${m.available ? 'AVAILABLE' : 'BUSY'}
          </span>
        </div>
        <div class="toggle-wrap">
          <label class="toggle" title="Toggle availability">
            <input type="checkbox" ${m.available ? 'checked' : ''}
              onchange="toggleAvailability(${m.id}, this.checked)" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div>
          <button class="btn btn-danger" title="Remove" onclick="deleteMember(${m.id})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function renderStats() {
    const total = teamData.length;
    const avail = teamData.filter(m => m.available).length;
    document.getElementById("statTotal").textContent = total;
    document.getElementById("statAvailable").textContent = avail;
    document.getElementById("statBusy").textContent = total - avail;
  }

  // ---- TOGGLE AVAILABILITY ----
  async function toggleAvailability(id, available) {
    try {
      const res = await fetch(`${API}/team/${id}/availability`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ available })
      });
      const data = await res.json();
      if (data.success) {
        const idx = teamData.findIndex(m => m.id === id);
        if (idx !== -1) teamData[idx].available = available;
        renderTeam();
        renderStats();
        toast(`${data.member.name} marked as ${available ? 'Available' : 'Busy'}`, "success");
      } else {
        toast(data.error || "Update failed", "error");
        fetchTeam();
      }
    } catch (e) {
      toast("Network error", "error");
      fetchTeam();
    }
  }

  // ---- ADD MEMBER ----
  async function addMember() {
    const name = document.getElementById("inputName").value.trim();
    const role = document.getElementById("inputRole").value.trim();
    if (!name || !role) { toast("Name and role are required", "error"); return; }

    try {
      const res = await fetch(`${API}/team`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, role, available: true })
      });
      const data = await res.json();
      if (data.success) {
        teamData.push(data.member);
        renderTeam();
        renderStats();
        document.getElementById("inputName").value = "";
        document.getElementById("inputRole").value = "";
        toggleAddForm();
        toast(`${data.member.name} added to team`, "success");
      } else {
        toast(data.error || "Failed to add member", "error");
      }
    } catch (e) {
      toast("Network error", "error");
    }
  }

  // ---- DELETE MEMBER ----
  async function deleteMember(id) {
    const member = teamData.find(m => m.id === id);
    if (!confirm(`Remove ${member?.name} from the team?`)) return;

    try {
      const res = await fetch(`${API}/team/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (data.success) {
        teamData = teamData.filter(m => m.id !== id);
        renderTeam();
        renderStats();
        toast(`${member?.name} removed`, "success");
      } else {
        toast(data.error || "Delete failed", "error");
      }
    } catch (e) {
      toast("Network error", "error");
    }
  }

  // ---- UI HELPERS ----
  function toggleAddForm() {
    const f = document.getElementById("addForm");
    f.classList.toggle("open");
    if (f.classList.contains("open")) document.getElementById("inputName").focus();
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toast(msg, type = "info") {
    const wrap = document.getElementById("toastWrap");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ---- INIT ----
  fetchTeam();
</script>
</body>
</html>
